<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>紅彈射飛碟</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a2a; touch-action: none; user-select: none; -webkit-user-select: none; font-family: "Microsoft JhengHei", sans-serif; }
    canvas { display: block; }
    #ui { position: absolute; top: 12px; left: 12px; color: #fff; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
    #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 22px; text-align: center; display: none; background: rgba(0,0,0,0.85); padding: 24px 32px; border-radius: 12px; box-shadow: 0 0 20px rgba(255,50,50,0.4); pointer-events: none; line-height: 1.5; }
    #instruction { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.6); font-size: 14px; pointer-events: none; transition: opacity 2s; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">擊中: <span id="score">0</span> / 10</div>
  <div id="message">🎉 恭喜過關！<br><br>點擊畫面重新開始</div>
  <div id="instruction">← 左右滑動移動 ｜ 雙擊螢幕發射 →</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('message');
    const instEl = document.getElementById('instruction');

    let w, h;
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      stars = Array.from({length: 60}, () => ({
        x: Math.random() * w, y: Math.random() * h, s: Math.random() * 2 + 0.5, b: Math.random() * 0.5 + 0.2
      }));
    }
    let stars = [];
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let gameOver = false;
    let playerX = w / 2;
    const playerY = h - 90;
    const playerW = 60, playerH = 40;
    let missiles = [];
    let ufoes = [];
    let particles = [];
    let ufoTimer = 0;
    let lastTapTime = 0;
    let audioCtx;

    function ensureAudioContext() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playVictorySound() {
      ensureAudioContext();
      try {
        const notes = [523.25, 659.25, 783.99, 1046.50, 783.99, 1046.50]; // C E G C G C
        let t = audioCtx.currentTime;
        notes.forEach((f, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = i < 3 ? 'triangle' : 'sine';
          osc.frequency.value = f;
          gain.gain.setValueAtTime(0.25, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start(t);
          osc.stop(t + 0.5);
          t += 0.12;
        });
      } catch(e) {}
    }

    function speakTTS(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-TW';
        u.rate = 0.95;
        u.pitch = 1.1;
        window.speechSynthesis.speak(u);
      }
    }

    function spawnUfo() {
      ufoes.push({
        x: Math.random() * (w - 80) + 40, y: -50,
        vx: (Math.random() - 0.5) * 2.5, vy: 1.0 + Math.random() * 0.8, r: 28
      });
    }

    function shoot() {
      ensureAudioContext();
      missiles.push({ x: playerX, y: playerY - 25, speed: 12, r: 6 });
    }

    function spawnFirework(x, y) {
      const colors = ['#ff1a1a', '#ff5500', '#ffaa00', '#ffff00', '#ffffff'];
      for (let i = 0; i < 45; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 1.5;
        particles.push({
          x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 1, decay: 0.015 + Math.random() * 0.02,
          color: colors[Math.floor(Math.random() * colors.length)], size: Math.random() * 3 + 2
        });
      }
    }

    function update() {
      if (gameOver) return;
      if (score > 0) instEl.style.opacity = 0;

      ufoTimer++;
      if (ufoTimer > 80) { spawnUfo(); ufoTimer = 0; }

      for (let i = missiles.length - 1; i >= 0; i--) {
        let m = missiles[i]; m.y -= m.speed;
        if (m.y < -10) missiles.splice(i, 1);
      }

      for (let i = ufoes.length - 1; i >= 0; i--) {
        let u = ufoes[i]; u.x += u.vx; u.y += u.vy;
        if (u.x < u.r || u.x > w - u.r) u.vx *= -1;
        if (u.y > h + 60) ufoes.splice(i, 1);
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }

      for (let i = missiles.length - 1; i >= 0; i--) {
        let m = missiles[i];
        for (let j = ufoes.length - 1; j >= 0; j--) {
          let u = ufoes[j];
          let dx = m.x - u.x, dy = m.y - u.y;
          if (Math.sqrt(dx*dx + dy*dy) < m.r + u.r * 0.8) {
            spawnFirework(u.x, u.y);
            missiles.splice(i, 1); ufoes.splice(j, 1);
            score++; scoreEl.textContent = score;
            if (score >= 10) {
              gameOver = true; msgEl.style.display = 'block';
              playVictorySound();
              speakTTS('恭喜您闖關成功');
            }
            break;
          }
        }
      }
    }

    function draw() {
      ctx.fillStyle = '#0a0a2a'; ctx.fillRect(0, 0, w, h);
      for (let s of stars) { ctx.fillStyle = `rgba(255,255,255,${s.b})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); }

      ctx.fillStyle = '#333'; ctx.beginPath(); ctx.moveTo(playerX - playerW/2, playerY + playerH/2); ctx.lineTo(playerX + playerW/2, playerY + playerH/2); ctx.lineTo(playerX, playerY - playerH/2); ctx.fill();
      ctx.fillStyle = '#ff2222'; ctx.fillRect(playerX - 5, playerY - playerH/2 - 18, 10, 18);

      for (let m of missiles) { ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = 'rgba(255, 80, 0, 0.6)'; ctx.fillRect(m.x - 2, m.y, 4, 12); ctx.fillStyle = '#ff0000'; }

      for (let u of ufoes) {
        ctx.fillStyle = '#00e5ff'; ctx.beginPath(); ctx.ellipse(u.x, u.y + 6, u.r * 1.5, u.r * 0.6, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#00b3cc'; ctx.beginPath(); ctx.ellipse(u.x, u.y - 4, u.r * 0.7, u.r * 0.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffeb3b'; for(let i=-1; i<=1; i++) { ctx.beginPath(); ctx.arc(u.x + i * 16, u.y + 9, 3.5, 0, Math.PI*2); ctx.fill(); }
      }

      for (let p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }
      ctx.globalAlpha = 1;
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    function handleTouchStart(e) {
      e.preventDefault(); ensureAudioContext();
      const now = Date.now();
      if (now - lastTapTime < 300) { if (!gameOver) shoot(); }
      lastTapTime = now;
      if (gameOver) resetGame();
    }

    function handleTouchMove(e) {
      e.preventDefault();
      if (!gameOver) { playerX = e.touches[0].clientX; if (playerX < 30) playerX = 30; if (playerX > w - 30) playerX = w - 30; }
    }

    canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
    canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
    canvas.addEventListener('touchstart', ensureAudioContext, {once: true});

    let isMouseDown = false;
    canvas.addEventListener('mousedown', (e) => { isMouseDown = true; handleTouchStart(e); });
    canvas.addEventListener('mousemove', (e) => { if (isMouseDown) handleTouchMove({preventDefault:()=>{}, touches:[{clientX:e.clientX}]}); });
    canvas.addEventListener('mouseup', () => isMouseDown = false);

    function resetGame() {
      score = 0; scoreEl.textContent = 0; gameOver = false; msgEl.style.display = 'none';
      missiles = []; ufoes = []; particles = []; ufoTimer = 0; playerX = w / 2; instEl.style.opacity = 1;
    }

    loop();

    // PWA Service Worker 註冊
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
