<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>紅彈射飛碟</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <audio id="bgm" src="BGM.mp3" loop preload="auto"></audio>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a2a; touch-action: none; user-select: none; -webkit-user-select: none; font-family: "Microsoft JhengHei", sans-serif; }
    canvas { display: block; }
    
    #ui { position: absolute; top: 12px; left: 12px; color: #fff; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 5; }
    #hp-container {
      position: absolute; top: 12px; right: 12px; width: 140px; height: 16px;
      background: #222; border-radius: 8px; overflow: hidden; border: 2px solid #444; z-index: 5;
    }
    #hp-bar {
      height: 100%; width: 100%; background: #33ff33; transition: width 0.3s ease, background 0.3s ease;
    }
    #instruction {
      position: absolute; bottom: 20px; width: 100%; text-align: center;
      color: rgba(255,255,255,0.6); font-size: 14px; pointer-events: none; transition: opacity 2s; z-index: 5;
    }
    
    #gameover {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 10, 42, 0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      z-index: 10;
    }
    #gameover h1 {
      color: #ff3333; font-size: 36px; margin-bottom: 40px; letter-spacing: 4px;
      text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
      animation: glitch 1.5s infinite alternate;
    }
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, -2px); }
      80% { transform: translate(1px, 1px); }
      100% { transform: translate(0); }
    }
    #restart-btn {
      padding: 16px 48px; font-size: 22px; font-weight: bold;
      background: linear-gradient(135deg, #ff4444, #cc0000);
      color: #fff; border: 2px solid #ff8888; border-radius: 14px;
      cursor: pointer; box-shadow: 0 0 20px rgba(255,0,0,0.6);
      transition: all 0.2s;
    }
    #restart-btn:active { transform: scale(0.95); box-shadow: 0 0 8px rgba(255,0,0,0.6); }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">擊中: <span id="score">0</span> / 10</div>
  <div id="hp-container"><div id="hp-bar"></div></div>
  <div id="instruction">← 左右滑動移動發射平台（自動射擊中） →</div>
  
  <div id="gameover">
    <h1>GAME OVER</h1>
    <button id="restart-btn">🔄 重新開始</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const hpBar = document.getElementById('hp-bar');
    const instEl = document.getElementById('instruction');
    const gameoverEl = document.getElementById('gameover');
    const restartBtn = document.getElementById('restart-btn');
    const bgmEl = document.getElementById('bgm');

    // 圖片載入
    const ufoImg = new Image(); ufoImg.src = 'UFO.png';
    const jetImg = new Image(); jetImg.src = 'JET.png';
    
    let w, h;
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      stars = Array.from({length: 60}, () => ({
        x: Math.random() * w, y: Math.random() * h, s: Math.random() * 2 + 0.5, b: Math.random() * 0.5 + 0.2
      }));
    }
    let stars = [];
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let playerHP = 10;
    const MAX_HP = 10;
    let gameOver = false;
    let isPaused = false;
    let playerX = w / 2;
    const playerY = h - 90;
    const playerW = 60, playerH = 45; // 邏輯判定尺寸
    
    let missiles = [];
    let ufoes = [];
    let enemyMissiles = [];
    let particles = [];
    let ripples = [];
    let ufoTimer = 0;
    let autoFireTimer = 0;
    const AUTO_FIRE_INTERVAL = 35;
    let audioCtx;

    // 音效與音樂
    function ensureAudioContext() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playBGM() {
      bgmEl.volume = 0.35;
      bgmEl.currentTime = 0;
      bgmEl.play().catch(e => console.log('BGM 需使用者互動:', e));
    }
    function pauseBGM() { bgmEl.pause(); }

    function playGameOverSound() {
      ensureAudioContext();
      try {
        const notes = [400, 350, 300, 200];
        let t = audioCtx.currentTime;
        notes.forEach(f => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.value = f;
          gain.gain.setValueAtTime(0.15, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start(t); osc.stop(t + 0.6);
          t += 0.15;
        });
      } catch(e) {}
    }

    function speakTTS(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-TW'; u.rate = 0.95; u.pitch = 1.1;
        window.speechSynthesis.speak(u);
      }
    }

    function spawnUfo() {
      ufoes.push({
        x: Math.random() * (w - 100) + 50, y: -50,
        vx: (Math.random() - 0.5) * 2.5, vy: 1.0 + Math.random() * 0.8, r: 28,
        shootTimer: Math.floor(Math.random() * 120 + 60)
      });
    }

    function shoot() {
      if (gameOver) return;
      ensureAudioContext();
      missiles.push({ x: playerX, y: playerY - 25, speed: 12, r: 6 });
    }

    function spawnFirework(x, y) {
      const colors = ['#ff1a1a', '#ff5500', '#ffaa00', '#ffff00', '#ffffff'];
      for (let i = 0; i < 45; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 1.5;
        particles.push({
          x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 1, decay: 0.015 + Math.random() * 0.02,
          color: colors[Math.floor(Math.random() * colors.length)], size: Math.random() * 3 + 2
        });
      }
    }

    function updateHPUI() {
      const pct = Math.max(0, (playerHP / MAX_HP) * 100);
      hpBar.style.width = pct + '%';
      if (pct <= 30) hpBar.style.background = '#ff3333';
      else if (pct <= 60) hpBar.style.background = '#ffaa00';
      else hpBar.style.background = '#33ff33';
    }

    function triggerGameOver() {
      if (gameOver) return;
      gameOver = true;
      isPaused = true;
      pauseBGM();
      
      // 發射台爆炸特效
      for(let i=0; i<90; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 7 + 2;
        particles.push({
          x: playerX, y: playerY,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 1, decay: 0.01,
          color: ['#ff0000','#ff8800','#ffff00','#ffffff'][Math.floor(Math.random()*4)],
          size: Math.random() * 5 + 2
        });
      }
      // 電波紋
      for(let i=0; i<5; i++) {
        ripples.push({
          x: playerX, y: playerY, r: 10, maxR: Math.max(w, h) * 0.8, 
          speed: 8 + i * 5, alpha: 0.9 - i * 0.15, color: '#00ffff'
        });
      }

      gameoverEl.style.display = 'flex';
      playGameOverSound();
      speakTTS('遊戲結束，血條歸零。請點擊重新開始');
    }

    function update() {
      // 暫停狀態下僅允許粒子與電波紋繼續播放動畫，其餘遊戲邏輯完全凍結
      if (gameOver) {
        // 僅更新視覺特效，其餘全部跳過
        for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
          if (p.life <= 0) particles.splice(i, 1);
        }
        for (let i = ripples.length - 1; i >= 0; i--) {
          let rp = ripples[i]; rp.r += rp.speed; rp.alpha -= 0.008;
          if (rp.alpha <= 0) ripples.splice(i, 1);
        }
        return; // 嚴禁繼續執行任何遊戲邏輯
      }

      if (score > 0) instEl.style.opacity = 0;
      ufoTimer++;
      if (ufoTimer > 80) { spawnUfo(); ufoTimer = 0; }

      autoFireTimer++;
      if (autoFireTimer >= AUTO_FIRE_INTERVAL) { shoot(); autoFireTimer = 0; }

      // 更新我方飛彈
      for (let i = missiles.length - 1; i >= 0; i--) {
        let m = missiles[i]; m.y -= m.speed;
        if (m.y < -10) missiles.splice(i, 1);
      }

      // 更新敵方飛碟與射擊
      for (let i = ufoes.length - 1; i >= 0; i--) {
        let u = ufoes[i]; 
        u.x += u.vx; u.y += u.vy;
        if (u.x < u.r || u.x > w - u.r) u.vx *= -1;
        if (u.y > h + 60) ufoes.splice(i, 1);

        u.shootTimer--;
        if (u.shootTimer <= 0) {
          enemyMissiles.push({ x: u.x, y: u.y + u.r, speed: 5.5, r: 6 });
          u.shootTimer = Math.floor(Math.random() * 100 + 80);
        }
      }

      // 更新敵方飛彈 & 碰撞
      for (let i = enemyMissiles.length - 1; i >= 0; i--) {
        let m = enemyMissiles[i];
        m.y += m.speed;
        if (m.y > h + 10) { enemyMissiles.splice(i, 1); continue; }

        let dx = playerX - m.x;
        let dy = (playerY - 5) - m.y;
        if (Math.sqrt(dx*dx + dy*dy) < playerW/2 + m.r) {
          enemyMissiles.splice(i, 1);
          playerHP--;
          updateHPUI();
          if (playerHP <= 0) triggerGameOver();
          break;
        }
      }

      // 我方飛彈 vs 敵方飛碟
      for (let i = missiles.length - 1; i >= 0; i--) {
        let m = missiles[i];
        for (let j = ufoes.length - 1; j >= 0; j--) {
          let u = ufoes[j];
          let dx = m.x - u.x, dy = m.y - u.y;
          if (Math.sqrt(dx*dx + dy*dy) < m.r + u.r * 0.8) {
            spawnFirework(u.x, u.y);
            missiles.splice(i, 1); ufoes.splice(j, 1);
            score++; scoreEl.textContent = score;
            if (score >= 10) {
              speakTTS('恭喜您闖關成功');
              setTimeout(() => resetGame(), 2500);
            }
            break;
          }
        }
      }

      // 平台碰撞飛碟
      for (let u of ufoes) {
        let dx = playerX - u.x;
        let dy = (playerY - 5) - u.y;
        if (Math.sqrt(dx*dx + dy*dy) < playerW/2 + u.r * 0.7) {
          triggerGameOver();
          break;
        }
      }

      // 更新粒子
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // 更新電波紋
      for (let i = ripples.length - 1; i >= 0; i--) {
        let rp = ripples[i];
        rp.r += rp.speed;
        rp.alpha -= 0.008;
        if (rp.alpha <= 0) ripples.splice(i, 1);
      }
    }

    function draw() {
      ctx.fillStyle = '#0a0a2a'; ctx.fillRect(0, 0, w, h);
      for (let s of stars) { ctx.fillStyle = `rgba(255,255,255,${s.b})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); }

      // 繪製飛碟 (優先使用圖片，載入失敗則回退畫圖)
      for (let u of ufoes) {
        if (ufoImg.complete && ufoImg.naturalWidth > 0) {
          ctx.drawImage(ufoImg, u.x - u.r * 1.5, u.y - u.r, u.r * 3, u.r * 2);
        } else {
          ctx.fillStyle = '#00e5ff'; ctx.beginPath(); ctx.ellipse(u.x, u.y + 6, u.r * 1.5, u.r * 0.6, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#00b3cc'; ctx.beginPath(); ctx.ellipse(u.x, u.y - 4, u.r * 0.7, u.r * 0.5, 0, 0, Math.PI * 2); ctx.fill();
        }
      }

      // 繪製發射車
      if (!gameOver) {
        if (jetImg.complete && jetImg.naturalWidth > 0) {
          ctx.drawImage(jetImg, playerX - playerW * 0.6, playerY - playerH * 0.9, playerW * 1.2, playerH * 1.6);
        } else {
          ctx.fillStyle = '#333'; ctx.beginPath(); 
          ctx.moveTo(playerX - playerW/2, playerY + playerH/2); 
          ctx.lineTo(playerX + playerW/2, playerY + playerH/2); 
          ctx.lineTo(playerX, playerY - playerH/2); ctx.fill();
          ctx.fillStyle = '#ff2222'; ctx.fillRect(playerX - 5, playerY - playerH/2 - 18, 10, 18);
        }
      }

      // 我方飛彈
      for (let m of missiles) { 
        ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = 'rgba(255, 80, 0, 0.6)'; ctx.fillRect(m.x - 2, m.y, 4, 12); ctx.fillStyle = '#ff0000'; 
      }

      // 敵方飛彈
      for (let m of enemyMissiles) {
        ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(0, 255, 255, 0.4)'; ctx.fillRect(m.x - 2, m.y - 10, 4, 12); ctx.fillStyle = '#00ffff';
      }

      // 電波紋
      ctx.lineWidth = 3;
      for (let rp of ripples) {
        ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0, 255, 255, ${rp.alpha})`;
        ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff';
        ctx.stroke(); ctx.shadowBlur = 0;
      }

      // 粒子
      for (let p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }
      ctx.globalAlpha = 1;
    }

    let animId;
    function loop() {
      update();
      draw();
      animId = requestAnimationFrame(loop);
    }

    function handleMove(clientX) {
      if (!gameOver) {
        playerX = clientX;
        if (playerX < 30) playerX = 30;
        if (playerX > w - 30) playerX = w - 30;
      }
    }
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX); }, {passive: false});
    canvas.addEventListener('mousemove', e => { handleMove(e.clientX); });

    // 首次互動解鎖音效/BGM
    canvas.addEventListener('touchstart', () => { ensureAudioContext(); playBGM(); }, {once: true});
    canvas.addEventListener('mousedown', () => { ensureAudioContext(); playBGM(); }, {once: true});

    function resetGame() {
      if (animId) cancelAnimationFrame(animId); // 確保舊迴圈停止
      score = 0; scoreEl.textContent = 0;
      playerHP = MAX_HP; updateHPUI();
      gameOver = false; isPaused = false;
      missiles = []; ufoes = []; enemyMissiles = []; particles = []; ripples = [];
      ufoTimer = 0; autoFireTimer = 0;
      playerX = w / 2;
      gameoverEl.style.display = 'none';
      instEl.style.opacity = 1;
      ensureAudioContext();
      playBGM();
      loop(); // 重新啟動遊戲迴圈
    }
    restartBtn.addEventListener('click', resetGame);
    restartBtn.addEventListener('touchstart', e => { e.preventDefault(); resetGame(); });

    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('SW registered'))
          .catch(err => console.log('SW registration failed:', err));
      });
    }

    updateHPUI();
    loop();
  </script>
</body>
</html>
