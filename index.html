<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>紅彈射飛碟</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a2a; touch-action: none; user-select: none; -webkit-user-select: none; font-family: "Microsoft JhengHei", sans-serif; }
    canvas { display: block; }
    #ui { position: absolute; top: 12px; left: 12px; color: #fff; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 5; }
    #instruction { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.6); font-size: 14px; pointer-events: none; transition: opacity 2s; z-index: 5; }
    
    #gameover {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 10, 42, 0.75);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      z-index: 10;
    }
    #gameover h1 {
      color: #ff3333; font-size: 32px; margin-bottom: 30px;
      text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
      animation: pulseText 1.5s infinite alternate;
    }
    @keyframes pulseText {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000; }
    }
    #restart-btn {
      padding: 14px 40px; font-size: 20px; font-weight: bold;
      background: linear-gradient(135deg, #ff4444, #cc0000);
      color: #fff; border: 2px solid #ff8888; border-radius: 12px;
      cursor: pointer; box-shadow: 0 0 15px rgba(255,0,0,0.5);
      transition: all 0.2s;
    }
    #restart-btn:active { transform: scale(0.95); box-shadow: 0 0 5px rgba(255,0,0,0.5); }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">擊中: <span id="score">0</span> / 10</div>
  <div id="instruction">← 左右滑動移動發射平台 →</div>
  
  <div id="gameover">
    <h1>⚡ GAME OVER ⚡</h1>
    <button id="restart-btn">🔄 重新開始</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const instEl = document.getElementById('instruction');
    const gameoverEl = document.getElementById('gameover');
    const restartBtn = document.getElementById('restart-btn');

    let w, h;
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      stars = Array.from({length: 60}, () => ({
        x: Math.random() * w, y: Math.random() * h, s: Math.random() * 2 + 0.5, b: Math.random() * 0.5 + 0.2
      }));
    }
    let stars = [];
    window.addEventListener('resize', resize);
    resize();

    let score = 0;
    let gameOver = false;
    let playerX = w / 2;
    const playerY = h - 90;
    const playerW = 60, playerH = 40;
    
    let missiles = [];
    let ufoes = [];
    let particles = [];
    let ripples = []; // 電波紋陣列
    let ufoTimer = 0;
    let autoFireTimer = 0;
    const AUTO_FIRE_INTERVAL = 35; // 約 0.6 秒自動發射一次
    let audioCtx;

    function ensureAudioContext() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playGameOverSound() {
      ensureAudioContext();
      try {
        const notes = [400, 350, 300, 200];
        let t = audioCtx.currentTime;
        notes.forEach(f => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.value = f;
          gain.gain.setValueAtTime(0.15, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start(t); osc.stop(t + 0.6);
          t += 0.15;
        });
      } catch(e) {}
    }

    function speakTTS(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-TW'; u.rate = 0.95; u.pitch = 1.1;
        window.speechSynthesis.speak(u);
      }
    }

    function spawnUfo() {
      ufoes.push({
        x: Math.random() * (w - 80) + 40, y: -50,
        vx: (Math.random() - 0.5) * 2.5, vy: 1.0 + Math.random() * 0.8, r: 28
      });
    }

    function shoot() {
      if (gameOver) return;
      ensureAudioContext();
      missiles.push({ x: playerX, y: playerY - 25, speed: 12, r: 6 });
    }

    function spawnFirework(x, y) {
      const colors = ['#ff1a1a', '#ff5500', '#ffaa00', '#ffff00', '#ffffff'];
      for (let i = 0; i < 45; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 1.5;
        particles.push({
          x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 1, decay: 0.015 + Math.random() * 0.02,
          color: colors[Math.floor(Math.random() * colors.length)], size: Math.random() * 3 + 2
        });
      }
    }

    function triggerGameOver() {
      gameOver = true;
      // 發射台爆炸粒子
      for(let i=0; i<80; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        particles.push({
          x: playerX, y: playerY,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 1, decay: 0.012,
          color: ['#ff0000','#ff8800','#ffff00','#ffffff'][Math.floor(Math.random()*4)],
          size: Math.random() * 4 + 2
        });
      }
      // 產生電波紋
      for(let i=0; i<4; i++) {
        ripples.push({
          x: playerX, y: playerY, r: 10, maxR: Math.max(w, h), 
          speed: 6 + i * 4, alpha: 0.9 - i * 0.2, color: '#00ffff'
        });
      }
      gameoverEl.style.display = 'flex';
      playGameOverSound();
      speakTTS('遊戲結束，點擊按鈕重新開始');
    }

    function update() {
      if (!gameOver) {
        if (score > 0) instEl.style.opacity = 0;
        ufoTimer++;
        if (ufoTimer > 80) { spawnUfo(); ufoTimer = 0; }

        // 自動發射邏輯
        autoFireTimer++;
        if (autoFireTimer >= AUTO_FIRE_INTERVAL) {
          shoot();
          autoFireTimer = 0;
        }

        // 更新飛彈
        for (let i = missiles.length - 1; i >= 0; i--) {
          let m = missiles[i]; m.y -= m.speed;
          if (m.y < -10) missiles.splice(i, 1);
        }

        // 更新飛碟
        for (let i = ufoes.length - 1; i >= 0; i--) {
          let u = ufoes[i]; u.x += u.vx; u.y += u.vy;
          if (u.x < u.r || u.x > w - u.r) u.vx *= -1;
          if (u.y > h + 60) ufoes.splice(i, 1);
        }

        // 碰撞檢測：飛彈 vs 飛碟
        for (let i = missiles.length - 1; i >= 0; i--) {
          let m = missiles[i];
          for (let j = ufoes.length - 1; j >= 0; j--) {
            let u = ufoes[j];
            let dx = m.x - u.x, dy = m.y - u.y;
            if (Math.sqrt(dx*dx + dy*dy) < m.r + u.r * 0.8) {
              spawnFirework(u.x, u.y);
              missiles.splice(i, 1); ufoes.splice(j, 1);
              score++; scoreEl.textContent = score;
              if (score >= 10) {
                gameOver = true;
                speakTTS('恭喜您闖關成功');
                // 可在此處加入過關畫面，但依需求改為碰撞失敗觸發 Game Over
                setTimeout(() => resetGame(), 2000); // 過關後自動重置示範，可依需求修改
              }
              break;
            }
          }
        }

        // 碰撞檢測：發射台 vs 飛碟
        for (let u of ufoes) {
          let dx = playerX - u.x;
          let dy = playerY - 10 - u.y; // 微調碰撞中心點
          if (Math.sqrt(dx*dx + dy*dy) < playerW/2 + u.r * 0.7) {
            triggerGameOver();
            break;
          }
        }
      }

      // 更新粒子
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // 更新電波紋
      for (let i = ripples.length - 1; i >= 0; i--) {
        let rp = ripples[i];
        rp.r += rp.speed;
        rp.alpha -= 0.008;
        if (rp.alpha <= 0) ripples.splice(i, 1);
      }
    }

    function draw() {
      ctx.fillStyle = '#0a0a2a'; ctx.fillRect(0, 0, w, h);
      // 星星
      for (let s of stars) { ctx.fillStyle = `rgba(255,255,255,${s.b})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); }

      // 發射平台 (僅在未爆炸時繪製)
      if (!gameOver) {
        ctx.fillStyle = '#333'; ctx.beginPath(); 
        ctx.moveTo(playerX - playerW/2, playerY + playerH/2); 
        ctx.lineTo(playerX + playerW/2, playerY + playerH/2); 
        ctx.lineTo(playerX, playerY - playerH/2); ctx.fill();
        ctx.fillStyle = '#ff2222'; ctx.fillRect(playerX - 5, playerY - playerH/2 - 18, 10, 18);
      }

      // 飛彈
      for (let m of missiles) { 
        ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = 'rgba(255, 80, 0, 0.6)'; ctx.fillRect(m.x - 2, m.y, 4, 12); ctx.fillStyle = '#ff0000'; 
      }

      // 飛碟
      for (let u of ufoes) {
        ctx.fillStyle = '#00e5ff'; ctx.beginPath(); ctx.ellipse(u.x, u.y + 6, u.r * 1.5, u.r * 0.6, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#00b3cc'; ctx.beginPath(); ctx.ellipse(u.x, u.y - 4, u.r * 0.7, u.r * 0.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffeb3b'; for(let i=-1; i<=1; i++) { ctx.beginPath(); ctx.arc(u.x + i * 16, u.y + 9, 3.5, 0, Math.PI*2); ctx.fill(); }
      }

      // 電波紋特效
      ctx.lineWidth = 3;
      for (let rp of ripples) {
        ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0, 255, 255, ${rp.alpha})`;
        ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff';
        ctx.stroke(); ctx.shadowBlur = 0;
      }

      // 粒子
      for (let p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }
      ctx.globalAlpha = 1;
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    // 觸控/滑鼠移動平台
    function handleMove(clientX) {
      if (!gameOver) {
        playerX = clientX;
        if (playerX < 30) playerX = 30;
        if (playerX > w - 30) playerX = w - 30;
      }
    }
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX); }, {passive: false});
    canvas.addEventListener('mousemove', e => { handleMove(e.clientX); });

    // 第一次觸碰解鎖音效
    canvas.addEventListener('touchstart', ensureAudioContext, {once: true});
    canvas.addEventListener('mousedown', ensureAudioContext, {once: true});

    // 重新開始按鈕
    function resetGame() {
      score = 0; scoreEl.textContent = 0;
      gameOver = false;
      missiles = []; ufoes = []; particles = []; ripples = [];
      ufoTimer = 0; autoFireTimer = 0;
      playerX = w / 2;
      gameoverEl.style.display = 'none';
      instEl.style.opacity = 1;
      ensureAudioContext();
    }
    restartBtn.addEventListener('click', resetGame);
    restartBtn.addEventListener('touchstart', e => { e.preventDefault(); resetGame(); });

    // 註冊 Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('SW registered'))
          .catch(err => console.log('SW registration failed:', err));
      });
    }

    loop();
  </script>
</body>
</html>
