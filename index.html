<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="銀河護衛">
  <title>銀河護衛 - 三章史詩</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/images/GALEXY-DEFENSE.png">
  <link rel="apple-touch-icon" href="assets/images/GALEXY-DEFENSE.png">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; background: #0a0a2a; touch-action: none; 
      user-select: none; -webkit-user-select: none; 
      font-family: "Microsoft JhengHei", sans-serif; 
    }
    canvas { display: block; }
    
    /* 章節過場畫面 */
    .chapter-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a2a; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 5000;
      color: #fff; text-align: center;
    }
    .chapter-screen img {
      max-width: 90%; max-height: 80vh; object-fit: contain;
      margin-bottom: 30px; animation: chapterFadeIn 0.5s ease;
    }
    @keyframes chapterFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .chapter-screen .tap-prompt {
      font-size: 18px; color: rgba(255,255,255,0.8);
      animation: pulse 1.5s infinite alternate;
    }
    @keyframes pulse {
      0% { opacity: 0.6; } 100% { opacity: 1; }
    }
    
    /* 影片過場 */
    .ending-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: none; flex-direction: column;
      justify-content: center; align-items: center; z-index: 6000;
    }
    .ending-screen video {
      max-width: 100%; max-height: 80vh; object-fit: contain;
    }
    .ending-screen .skip-btn {
      position: absolute; bottom: 30px; right: 30px;
      padding: 10px 25px; background: rgba(255,255,255,0.2);
      color: #fff; border: 1px solid #fff; border-radius: 20px;
      font-size: 14px; cursor: pointer; display: none;
    }
    .ending-screen .skip-btn.show { display: block; }
    
    /* 排行榜畫面 */
    #ranking-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10,10,42,0.95); display: none;
      flex-direction: column; justify-content: center; align-items: center;
      z-index: 7000; padding: 20px;
    }
    #ranking-canvas {
      max-width: 100%; max-height: 85vh; border-radius: 12px;
      box-shadow: 0 0 30px rgba(51,255,51,0.3);
    }
    #ranking-screen .close-btn {
      margin-top: 20px; padding: 12px 35px;
      background: linear-gradient(135deg, #33ff33, #00aa00);
      color: #000; border: none; border-radius: 8px;
      font-size: 18px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- 遊戲 Canvas -->
  <canvas id="game"></canvas>
  
  <!-- 章節過場畫面（動態載入） -->
  <div id="chapter-screen" class="chapter-screen" style="display:none;">
    <img id="chapter-image" src="" alt="Chapter">
    <div class="tap-prompt">👆 點擊螢幕開始</div>
  </div>
  
  <!-- 章節結束影片 -->
  <div id="ending-screen" class="ending-screen">
    <video id="ending-video" src="" loop></video>
    <button id="skip-ending" class="skip-btn">⏭️ 跳過</button>
  </div>
  
  <!-- 排行榜畫面 -->
  <div id="ranking-screen">
    <canvas id="ranking-canvas" width="800" height="1200"></canvas>
    <button id="close-ranking" class="close-btn">✅ 繼續遊戲</button>
  </div>

  <!-- 模組載入 -->
  <script type="module">
    // Firebase 初始化
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyBISCj6wS2gJgQbCZ6quWWzoIOoTtJMne8",
      authDomain: "galaxy-defense-ranking.firebaseapp.com",
      databaseURL: "https://galaxy-defense-ranking-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "galaxy-defense-ranking",
      storageBucket: "galaxy-defense-ranking.firebasestorage.app",
      messagingSenderId: "304162275803",
      appId: "1:304162275803:web:4bfb77544f3c1a43a167fe"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    // 匯入遊戲模組
    import { GameCore } from './js/core.js';
    import { InputManager } from './js/input.js';
    import { getLevelConfig } from './js/levels.js';
    import { VFXManager } from './js/vfx.js';
    import { UIManager } from './js/ui.js';
    import { RankingManager } from './js/ranking.js';
    
    // 全域狀態
    window.gameState = {
      chapter: 1,
      level: 1,
      playerId: null,
      uiManager: null,
      rankingManager: null
    };
    
    // 初始化流程
    async function init() {
      // 1. 匿名登入取得玩家 ID
      const user = await signInAnonymously(auth);
      window.gameState.playerId = user.user.uid;
      
      // 2. 初始化 UI 管理器（暱稱 + 頭像）
      window.gameState.uiManager = new UIManager();
      const hasPlayerData = await window.gameState.uiManager.loadFromStorage(window.gameState.playerId);
      
      if (!hasPlayerData) {
        // 首次遊戲：顯示暱稱設定
        await new Promise(resolve => {
          window.gameState.uiManager.showNicknameModal((data) => {
            window.gameState.uiManager.saveToStorage(window.gameState.playerId);
            resolve();
          });
        });
      }
      
      // 3. 初始化排行榜管理器
      window.gameState.rankingManager = new RankingManager(firebaseConfig, window.gameState.playerId);
      
      // 4. 啟動遊戲核心
      const canvas = document.getElementById('game');
      const game = new GameCore(canvas, {
        onChapterStart: showChapterScreen,
        onChapterEnd: showEndingVideo,
        onGameEnd: showRanking
      });
      
      game.start();
    }
    
    // 顯示章節起始畫面
    async function showChapterScreen(chapter) {
      const screen = document.getElementById('chapter-screen');
      const img = document.getElementById('chapter-image');
      
      img.src = `assets/images/CHAPTER-0${chapter}.png`;
      screen.style.display = 'flex';
      
      // 等待點擊
      await new Promise(resolve => {
        const handler = () => {
          screen.removeEventListener('click', handler);
          screen.removeEventListener('touchstart', handler);
          screen.style.display = 'none';
          resolve();
        };
        screen.addEventListener('click', handler);
        screen.addEventListener('touchstart', handler, { passive: true });
      });
    }
    
    // 顯示章節結束影片
    async function showEndingVideo(chapter) {
      const screen = document.getElementById('ending-screen');
      const video = document.getElementById('ending-video');
      const skipBtn = document.getElementById('skip-ending');
      
      video.src = `assets/images/CHAPTER-0${chapter}-ENDING.mp4`;
      screen.style.display = 'flex';
      
      // iOS 相容：點擊播放
      const playVideo = async () => {
        try {
          await video.play();
          // 3 秒後顯示跳過按鈕
          setTimeout(() => skipBtn.classList.add('show'), 3000);
        } catch (e) {
          console.warn('Video autoplay failed:', e);
        }
      };
      
      screen.addEventListener('click', playVideo, { once: true });
      screen.addEventListener('touchstart', playVideo, { once: true, passive: true });
      
      // 跳過或影片結束
      const endHandler = () => {
        screen.style.display = 'none';
        video.pause();
        skipBtn.classList.remove('show');
      };
      
      skipBtn.addEventListener('click', endHandler);
      video.addEventListener('ended', endHandler);
    }
    
    // 顯示排行榜
    async function showRanking() {
      const screen = document.getElementById('ranking-screen');
      const canvas = document.getElementById('ranking-canvas');
      const ctx = canvas.getContext('2d');
      
      screen.style.display = 'flex';
      
      // 載入模板圖片
      const templateImg = new Image();
      templateImg.src = 'assets/images/GLOBAL-RANKING-01.png';
      
      await new Promise(resolve => {
        templateImg.onload = resolve;
      });
      
      // 渲染排行榜
      const rankingImg = await window.gameState.rankingManager.renderToTemplate(canvas, templateImg);
      
      // 顯示關閉按鈕
      document.getElementById('close-ranking').onclick = () => {
        screen.style.display = 'none';
        // 可在此導回首頁或結束遊戲
      };
    }
    
    // 啟動
    init();
  </script>
</body>
</html>
