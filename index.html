<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>紅彈射飛碟 - 三關挑戰</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <audio id="bgm" src="BGM.mp3" loop preload="auto"></audio>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a2a; touch-action: none; user-select: none; -webkit-user-select: none; font-family: "Microsoft JhengHei", sans-serif; }
    canvas { display: block; }
    
    #ui { position: absolute; top: 12px; left: 12px; color: #fff; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 5; }
    #hp-container {
      position: absolute; top: 12px; right: 12px; width: 140px; height: 16px;
      background: #222; border-radius: 8px; overflow: hidden; border: 2px solid #444; z-index: 5;
    }
    #hp-bar {
      height: 100%; width: 100%; background: #33ff33; transition: width 0.3s ease, background 0.3s ease;
    }
    #level-indicator {
      position: absolute; top: 40px; left: 12px; color: #ffff00; font-size: 16px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 5; pointer-events: none;
    }
    #instruction {
      position: absolute; bottom: 20px; width: 100%; text-align: center;
      color: rgba(255,255,255,0.6); font-size: 14px; pointer-events: none; transition: opacity 2s; z-index: 5;
    }
    
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 10, 42, 0.9);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      z-index: 10;
    }
    .overlay h1 {
      color: #33ff33; font-size: 28px; margin-bottom: 20px; text-align: center;
      text-shadow: 0 0 15px #33ff33;
    }
    .city-image {
      max-width: 80%; max-height: 40vh; object-fit: contain;
      border-radius: 12px; box-shadow: 0 0 30px rgba(51,255,51,0.5);
      margin-bottom: 20px;
    }
    .btn {
      padding: 16px 48px; font-size: 20px; font-weight: bold;
      background: linear-gradient(135deg, #33ff33, #00cc00);
      color: #000; border: 2px solid #66ff66; border-radius: 14px;
      cursor: pointer; box-shadow: 0 0 20px rgba(51,255,51,0.6);
      transition: all 0.2s; margin: 10px;
    }
    .btn:active { transform: scale(0.95); }
    .btn-red {
      background: linear-gradient(135deg, #ff4444, #cc0000);
      color: #fff; border: 2px solid #ff8888;
      box-shadow: 0 0 20px rgba(255,0,0,0.6);
    }
    
    #gameover {
      background: rgba(10, 10, 42, 0.95);
    }
    #gameover h1 {
      color: #ff3333; font-size: 36px;
      text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
      animation: glitch 1.5s infinite alternate;
    }
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, -2px); }
      80% { transform: translate(1px, 1px); }
      100% { transform: translate(0); }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">擊中: <span id="score">0</span> / <span id="target">10</span></div>
  <div id="level-indicator">第 <span id="level">1</span> 關</div>
  <div id="hp-container"><div id="hp-bar"></div></div>
  <div id="instruction">← 左右滑動移動發射平台（自動射擊中） →</div>
  
  <!-- 過關畫面 -->
  <div id="level-complete" class="overlay">
    <h1 id="complete-msg">恭喜您通過第一關</h1>
    <img id="city-img" class="city-image" src="" alt="城市風景">
    <button id="next-level-btn" class="btn">繼續下一關 →</button>
  </div>
  
  <!-- 遊戲結束畫面 -->
  <div id="gameover" class="overlay">
    <h1>GAME OVER</h1>
    <button id="restart-btn" class="btn btn-red">🔄 重新開始</button>
  </div>
  
  <!-- 最終結束訊息 -->
  <div id="final-end" class="overlay">
    <h1 style="color: #ffff00; font-size: 24px;">遊戲結束，不要玩得太沉迷</h1>
    <button id="quit-btn" class="btn">結束遊戲</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const targetEl = document.getElementById('target');
    const levelEl = document.getElementById('level');
    const hpBar = document.getElementById('hp-bar');
    const instEl = document.getElementById('instruction');
    const levelCompleteEl = document.getElementById('level-complete');
    const gameoverEl = document.getElementById('gameover');
    const finalEndEl = document.getElementById('final-end');
    const cityImg = document.getElementById('city-img');
    const completeMsg = document.getElementById('complete-msg');
    const nextLevelBtn = document.getElementById('next-level-btn');
    const restartBtn = document.getElementById('restart-btn');
    const quitBtn = document.getElementById('quit-btn');
    const bgmEl = document.getElementById('bgm');

    // 圖片變數
    let cleanedUfo = null;
    let cleanedJet = null;
    
    // 遊戲狀態
    let currentLevel = 1;
    let score = 0;
    let playerHP = 10;
    const MAX_HP = 10;
    let gameOver = false;
    let gameEnded = false;
    let playerX = 0;
    let playerY = 0;
    const playerW = 60, playerH = 45;
    
    let missiles = [];
    let ufoes = [];
    let enemyMissiles = [];
    let particles = [];
    let ripples = [];
    let stars = [];
    let ufoTimer = 0;
    let autoFireTimer = 0;
    let audioCtx;

    // 關卡設定
    const levelConfig = {
      1: { targets: 10, weapon: 'bomb', speed: 1, ufoSpeed: 1 },
      2: { targets: 15, weapon: 'laser', speed: 1, ufoSpeed: 1.2 },
      3: { targets: 25, weapon: 'laser', speed: 1.5, ufoSpeed: 1.8 }
    };

    const cityImages = {
      1: 'TAIPEI.PNG',
      2: 'TAICHUNG.PNG',
      3: 'PARIS.PNG'
    };

    // 初始化遊戲 - 立即啟動，不等圖片
    function initGame() {
      resize();
      updateHPUI();
      loadImages(); // 非同步載入圖片
      loop(); // 立即開始遊戲迴圈
    }

    // 載入圖片（非同步，不阻擋遊戲）
    function loadImages() {
      // 載入 UFO
      const ufoImg = new Image();
      ufoImg.src = 'UFO.png';
      ufoImg.onload = () => {
        cleanedUfo = removeWhiteBackgroundSync(ufoImg);
      };
      
      // 載入 JET
      const jetImg = new Image();
      jetImg.src = 'JET.png';
      jetImg.onload = () => {
        cleanedJet = removeWhiteBackgroundSync(jetImg);
      };
    }

    // 同步去背函數
    function removeWhiteBackgroundSync(img) {
      try {
        const offCanvas = document.createElement('canvas');
        offCanvas.width = img.width;
        offCanvas.height = img.height;
        const offCtx = offCanvas.getContext('2d');
        offCtx.drawImage(img, 0, 0);
        
        const imgData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
        const data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i+1], b = data[i+2];
          if (r > 200 && g > 200 && b > 200) {
            data[i+3] = 0;
          }
        }
        
        offCtx.putImageData(imgData, 0, 0);
        return offCanvas;
      } catch(e) {
        console.log('去背失敗，使用原始圖片');
        return img;
      }
    }

    function resize() {
      const w = canvas.width = window.innerWidth;
      const h = canvas.height = window.innerHeight;
      playerX = w / 2;
      playerY = h - 90;
      stars = Array.from({length: 80}, () => ({
        x: Math.random() * w, y: Math.random() * h, s: Math.random() * 2 + 0.5, b: Math.random() * 0.5 + 0.2
      }));
    }
    window.addEventListener('resize', resize);

    function ensureAudioContext() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBGM() {
      bgmEl.volume = 0.35;
      bgmEl.currentTime = 0;
      bgmEl.play().catch(e => console.log('BGM 需使用者互動:', e));
    }

    function pauseBGM() { bgmEl.pause(); }

    function playGameOverSound() {
      ensureAudioContext();
      try {
        const notes = [400, 350, 300, 200];
        let t = audioCtx.currentTime;
        notes.forEach(f => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.value = f;
          gain.gain.setValueAtTime(0.15, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start(t); osc.stop(t + 0.6);
          t += 0.15;
        });
      } catch(e) {}
    }

    function speakTTS(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-TW'; u.rate = 0.95; u.pitch = 1.1;
        window.speechSynthesis.speak(u);
      }
    }

    function spawnUfo() {
      const config = levelConfig[currentLevel];
      ufoes.push({
        x: Math.random() * (canvas.width - 100) + 50, y: -50,
        vx: (Math.random() - 0.5) * 2.5 * config.ufoSpeed,
        vy: (1.0 + Math.random() * 0.8) * config.ufoSpeed,
        r: 28,
        shootTimer: Math.floor(Math.random() * 120 + 60)
      });
    }

    function shoot() {
      if (gameOver || gameEnded) return;
      ensureAudioContext();
      const config = levelConfig[currentLevel];
      
      if (config.weapon === 'bomb') {
        missiles.push({ x: playerX, y: playerY - 25, speed: 12 * config.speed, r: 6, type: 'bomb' });
      } else {
        missiles.push({ x: playerX, y: playerY - 25, speed: 15 * config.speed, r: 4, type: 'laser' });
      }
    }

    function spawnFirework(x, y) {
      const colors = ['#ff1a1a', '#ff5500', '#ffaa00', '#ffff00', '#ffffff'];
      for (let i = 0; i < 45; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 1.5;
        particles.push({
          x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 1, decay: 0.015 + Math.random() * 0.02,
          color: colors[Math.floor(Math.random() * colors.length)], size: Math.random() * 3 + 2
        });
      }
    }

    function updateHPUI() {
      const pct = Math.max(0, (playerHP / MAX_HP) * 100);
      hpBar.style.width = pct + '%';
      if (pct <= 30) hpBar.style.background = '#ff3333';
      else if (pct <= 60) hpBar.style.background = '#ffaa00';
      else hpBar.style.background = '#33ff33';
    }

    function levelComplete() {
      pauseBGM();
      completeMsg.textContent = `恭喜您通過第${currentLevel}關`;
      cityImg.src = cityImages[currentLevel];
      levelCompleteEl.style.display = 'flex';
      speakTTS(`恭喜您通過第${currentLevel}關`);
      
      if (currentLevel === 3) {
        nextLevelBtn.textContent = '結束遊戲';
        nextLevelBtn.onclick = showFinalEnd;
      } else {
        nextLevelBtn.textContent = `繼續第${currentLevel + 1}關 →`;
        nextLevelBtn.onclick = nextLevel;
      }
    }

    function nextLevel() {
      currentLevel++;
      score = 0;
      scoreEl.textContent = score;
      targetEl.textContent = levelConfig[currentLevel].targets;
      levelEl.textContent = currentLevel;
      playerHP = MAX_HP;
      updateHPUI();
      
      missiles = [];
      ufoes = [];
      enemyMissiles = [];
      particles = [];
      ripples = [];
      ufoTimer = 0;
      autoFireTimer = 0;
      
      levelCompleteEl.style.display = 'none';
      playBGM();
    }

    function showFinalEnd() {
      levelCompleteEl.style.display = 'none';
      finalEndEl.style.display = 'flex';
      speakTTS('遊戲結束，不要玩得太沉迷');
    }

    function triggerGameOver() {
      if (gameOver) return;
      gameOver = true;
      pauseBGM();
      
      for(let i=0; i<90; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 7 + 2;
        particles.push({
          x: playerX, y: playerY,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 1, decay: 0.01,
          color: ['#ff0000','#ff8800','#ffff00','#ffffff'][Math.floor(Math.random()*4)],
          size: Math.random() * 5 + 2
        });
      }
      for(let i=0; i<5; i++) {
        ripples.push({
          x: playerX, y: playerY, r: 10, maxR: Math.max(canvas.width, canvas.height) * 0.8, 
          speed: 8 + i * 5, alpha: 0.9 - i * 0.15, color: '#00ffff'
        });
      }

      gameoverEl.style.display = 'flex';
      playGameOverSound();
      speakTTS('遊戲結束，血量歸零');
    }

    function resetToLevel1() {
      currentLevel = 1;
      score = 0;
      scoreEl.textContent = score;
      targetEl.textContent = levelConfig[1].targets;
      levelEl.textContent = currentLevel;
      playerHP = MAX_HP;
      updateHPUI();
      
      missiles = [];
      ufoes = [];
      enemyMissiles = [];
      particles = [];
      ripples = [];
      ufoTimer = 0;
      autoFireTimer = 0;
      
      gameoverEl.style.display = 'none';
      gameOver = false;
      playBGM();
    }

    function quitGame() {
      gameEnded = true;
      finalEndEl.style.display = 'none';
      ctx.fillStyle = '#0a0a2a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = '24px Microsoft JhengHei';
      ctx.textAlign = 'center';
      ctx.fillText('感謝遊玩', canvas.width/2, canvas.height/2);
      speakTTS('感謝遊玩');
    }

    function update() {
      if (gameOver || gameEnded) {
        if (!gameEnded) {
          for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
          }
          for (let i = ripples.length - 1; i >= 0; i--) {
            let rp = ripples[i]; rp.r += rp.speed; rp.alpha -= 0.008;
            if (rp.alpha <= 0) ripples.splice(i, 1);
          }
        }
        return;
      }

      if (score > 0) instEl.style.opacity = 0;
      
      const config = levelConfig[currentLevel];
      const fireInterval = config.weapon === 'laser' ? 15 : 35;
      
      ufoTimer++;
      if (ufoTimer > 80 / config.ufoSpeed) { spawnUfo(); ufoTimer = 0; }

      autoFireTimer++;
      if (autoFireTimer >= fireInterval) { shoot(); autoFireTimer = 0; }

      for (let i = missiles.length - 1; i >= 0; i--) {
        let m = missiles[i]; m.y -= m.speed;
        if (m.y < -10) missiles.splice(i, 1);
      }

      for (let i = ufoes.length - 1; i >= 0; i--) {
        let u = ufoes[i]; 
        u.x += u.vx; u.y += u.vy;
        if (u.x < u.r || u.x > canvas.width - u.r) u.vx *= -1;
        if (u.y > canvas.height + 60) ufoes.splice(i, 1);

        u.shootTimer--;
        if (u.shootTimer <= 0) {
          enemyMissiles.push({ x: u.x, y: u.y + u.r, speed: 5.5 * config.ufoSpeed, r: 6 });
          u.shootTimer = Math.floor(Math.random() * 100 + 80);
        }
      }

      for (let i = enemyMissiles.length - 1; i >= 0; i--) {
        let m = enemyMissiles[i];
        m.y += m.speed;
        if (m.y > canvas.height + 10) { enemyMissiles.splice(i, 1); continue; }

        let dx = playerX - m.x;
        let dy = (playerY - 5) - m.y;
        if (Math.sqrt(dx*dx + dy*dy) < playerW/2 + m.r) {
          enemyMissiles.splice(i, 1);
          playerHP--;
          updateHPUI();
          if (playerHP <= 0) triggerGameOver();
          break;
        }
      }

      for (let i = missiles.length - 1; i >= 0; i--) {
        let m = missiles[i];
        for (let j = ufoes.length - 1; j >= 0; j--) {
          let u = ufoes[j];
          let dx = m.x - u.x, dy = m.y - u.y;
          if (Math.sqrt(dx*dx + dy*dy) < m.r + u.r * 0.8) {
            spawnFirework(u.x, u.y);
            missiles.splice(i, 1); ufoes.splice(j, 1);
            score++; scoreEl.textContent = score;
            if (score >= config.targets) {
              levelComplete();
            }
            break;
          }
        }
      }

      for (let u of ufoes) {
        let dx = playerX - u.x;
        let dy = (playerY - 5) - u.y;
        if (Math.sqrt(dx*dx + dy*dy) < playerW/2 + u.r * 0.7) {
          triggerGameOver();
          break;
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = ripples.length - 1; i >= 0; i--) {
        let rp = ripples[i]; rp.r += rp.speed; rp.alpha -= 0.008;
        if (rp.alpha <= 0) ripples.splice(i, 1);
      }
    }

    function draw() {
      ctx.fillStyle = '#0a0a2a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let s of stars) { ctx.fillStyle = `rgba(255,255,255,${s.b})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); }

      // 繪製飛碟
      for (let u of ufoes) {
        if (cleanedUfo) {
          ctx.drawImage(cleanedUfo, u.x - u.r * 1.5, u.y - u.r, u.r * 3, u.r * 2);
        } else {
          ctx.fillStyle = '#00e5ff'; ctx.beginPath(); ctx.ellipse(u.x, u.y + 6, u.r * 1.5, u.r * 0.6, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#00b3cc'; ctx.beginPath(); ctx.ellipse(u.x, u.y - 4, u.r * 0.7, u.r * 0.5, 0, 0, Math.PI * 2); ctx.fill();
        }
      }

      // 繪製戰機
      if (!gameOver && !gameEnded) {
        if (cleanedJet) {
          ctx.drawImage(cleanedJet, playerX - playerW * 0.6, playerY - playerH * 0.9, playerW * 1.2, playerH * 1.6);
        } else {
          ctx.fillStyle = '#333'; ctx.beginPath(); 
          ctx.moveTo(playerX - playerW/2, playerY + playerH/2); 
          ctx.lineTo(playerX + playerW/2, playerY + playerH/2); 
          ctx.lineTo(playerX, playerY - playerH/2); ctx.fill();
          ctx.fillStyle = '#ff2222'; ctx.fillRect(playerX - 5, playerY - playerH/2 - 18, 10, 18);
        }
      }

      // 繪製飛彈
      for (let m of missiles) {
        if (m.type === 'bomb') {
          ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = 'rgba(255, 80, 0, 0.6)'; ctx.fillRect(m.x - 2, m.y, 4, 12);
        } else {
          ctx.fillStyle = '#00ff00'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = 'rgba(0, 255, 0, 0.6)'; ctx.fillRect(m.x - 2, m.y, 4, 15);
        }
      }

      for (let m of enemyMissiles) {
        ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(0, 255, 255, 0.4)'; ctx.fillRect(m.x - 2, m.y - 10, 4, 12);
      }

      ctx.lineWidth = 3;
      for (let rp of ripples) {
        ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0, 255, 255, ${rp.alpha})`;
        ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff';
        ctx.stroke(); ctx.shadowBlur = 0;
      }

      for (let p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }
      ctx.globalAlpha = 1;
    }

    let animId;
    function loop() {
      update();
      draw();
      animId = requestAnimationFrame(loop);
    }

    function handleMove(clientX) {
      if (!gameOver && !gameEnded) {
        playerX = clientX;
        if (playerX < 30) playerX = 30;
        if (playerX > canvas.width - 30) playerX = canvas.width - 30;
      }
    }
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX); }, {passive: false});
    canvas.addEventListener('mousemove', e => { handleMove(e.clientX); });

    canvas.addEventListener('touchstart', () => { ensureAudioContext(); playBGM(); }, {once: true});
    canvas.addEventListener('mousedown', () => { ensureAudioContext(); playBGM(); }, {once: true});

    function resetGame() {
      if (animId) cancelAnimationFrame(animId);
      currentLevel = 1;
      score = 0; scoreEl.textContent = score;
      targetEl.textContent = levelConfig[1].targets;
      levelEl.textContent = currentLevel;
      playerHP = MAX_HP; updateHPUI();
      gameOver = false; gameEnded = false;
      missiles = []; ufoes = []; enemyMissiles = []; particles = []; ripples = [];
      ufoTimer = 0; autoFireTimer = 0;
      playerX = canvas.width / 2;
      gameoverEl.style.display = 'none';
      instEl.style.opacity = 1;
      ensureAudioContext();
      playBGM();
      loop();
    }

    restartBtn.addEventListener('click', resetGame);
    restartBtn.addEventListener('touchstart', e => { e.preventDefault(); resetGame(); });
    quitBtn.addEventListener('click', quitGame);
    quitBtn.addEventListener('touchstart', e => { e.preventDefault(); quitGame(); });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('SW registered'))
          .catch(err => console.log('SW registration failed:', err));
      });
    }

    // 立即啟動遊戲！
    window.onload = initGame;
  </script>
</body>
</html>
