<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a2a">
  <title>銀河護衛 - 三關挑戰</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="GALEXY-DEFENSE.png" type="image/png">
  <style>
    :root {
      --bg-color: #0a0a2a;
      --ui-primary: #00d2ff;
      --ui-secondary: #007bff;
      --text-shadow: 0 2px 6px rgba(0,0,0,0.85);
      --btn-shadow: 0 4px 12px rgba(0,120,255,0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg-color); color: #fff;
      font-family: system-ui, -apple-system, "Microsoft JhengHei", "PingFang TC", sans-serif;
      touch-action: none; user-select: none; -webkit-user-select: none;
    }
    #gameCanvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: block; z-index: 1;
    }

    /* UI 層 */
    #uiLayer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; pointer-events: none; display: flex; flex-direction: column;
    }
    #titleText {
      text-align: center; padding: 18px 10px 10px; font-size: 22px; font-weight: 800;
      text-shadow: var(--text-shadow); letter-spacing: 2px;
      background: linear-gradient(180deg, rgba(10,10,42,0.9) 0%, transparent 100%);
    }
    #hud {
      text-align: center; padding: 8px; font-size: 16px; color: var(--ui-primary);
      text-shadow: var(--text-shadow); font-weight: 600;
    }

    /* 畫面容器 */
    .screen {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 16px;
      padding: 24px; pointer-events: auto; text-align: center;
      background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, transparent 70%);
    }
    .hidden { display: none !important; }
    .screen p { line-height: 1.6; }

    button {
      background: linear-gradient(135deg, var(--ui-primary), var(--ui-secondary));
      border: none; color: #fff; padding: 16px 32px;
      border-radius: 32px; font-size: 18px; font-weight: bold;
      cursor: pointer; box-shadow: var(--btn-shadow);
      transition: transform 0.15s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,120,255,0.2); }
    button.secondary {
      background: #444; color: #ddd; box-shadow: none; font-size: 16px; padding: 12px 24px;
    }
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

    /* 過場覆蓋層 */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 5, 25, 0.98);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9999; transition: opacity 0.3s ease;
      pointer-events: auto; cursor: pointer;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .overlay.hidden { display: none; opacity: 0; }
    .overlay img, .overlay video {
      max-width: 94vw; max-height: 72vh; object-fit: contain;
      border-radius: 12px; box-shadow: 0 0 30px rgba(0,210,255,0.25);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .overlay p {
      margin-top: 24px; font-size: 18px; color: #aaa;
      animation: pulse 1.6s infinite ease-in-out;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.6; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }

    /* 載入提示 */
    .loading-ring {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
      border-top: 3px solid var(--ui-primary); border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <div id="uiLayer">
    <div id="titleText">🚀 銀河護衛GALAXY DEFENSE🛸</div>
    <div id="hud">擊中: 0 / 20 第 1 關</div>

    <!-- 主選單 -->
    <div id="menuScreen" class="screen">
      <p style="font-size:18px;">擊落外星飛碟 · 保衛地球</p>
      <p style="font-size:14px; color:#88b;">👆 拖曳畫面控制戰機移動（自動射擊）</p>
      <button id="startBtn">點擊開始遊戲</button>
    </div>

    <!-- 關卡結束提示 -->
    <div id="levelEndScreen" class="screen hidden">
      <div id="levelEndTitle" style="font-size:20px; font-weight:bold; color:#4dff4d;">恭喜您通過第一關</div>
      <div style="font-size:13px; color:#f88; margin:8px 0;">⚠️ 圖片載入失敗請確認檔案名稱正確</div>
      <button id="nextBtn">繼續下一關 →</button>
    </div>

    <!-- 遊戲結束 -->
    <div id="gameOverScreen" class="screen hidden">
      <div id="gameOverTitle" style="font-size:24px; font-weight:bold; color:#ff4d4d;">GAME OVER</div>
      <div style="font-size:15px; color:#ccc; margin:10px 0;">🎮 遊戲結束不要玩得太沉迷</div>
      <div class="btn-group">
        <button id="restartBtn">🔄 重新開始</button>
        <button id="endGameBtn" class="secondary">結束遊戲</button>
      </div>
    </div>
  </div>

  <!-- 關卡開始前：過場圖片 -->
  <div id="preLevelOverlay" class="overlay hidden">
    <div class="loading-ring"></div>
    <img id="preLevelImg" src="" alt="Chapter Start">
    <p>點擊任意鍵或畫面繼續</p>
  </div>

  <!-- 關卡結束後：過場影片 -->
  <div id="postLevelOverlay" class="overlay hidden">
    <video id="postLevelVideo" src="" muted playsinline loop autoplay></video>
    <p id="postLevelPrompt">點擊任意鍵繼續</p>
  </div>

  <script src="sw.js"></script>
</body>
</html>
